name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        targets: wasm32-unknown-unknown

    - name: Install dependencies
      run: npm install

    - name: Next.js Build
      run: npm run build
      env:
        NEXT_PUBLIC_VERCEL_URL: "ci-test"

    - name: Lint
      run: npm run lint

    - name: Run Contract Tests
      working-directory: ./rust-contracts/medichain
      run: cargo test
      continue-on-error: true
